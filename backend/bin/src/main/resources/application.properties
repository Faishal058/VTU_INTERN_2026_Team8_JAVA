# ───── Server ─────
server.port=8080

# ───── PostgreSQL / Supabase ─────
spring.datasource.url=jdbc:postgresql://db.exkqbxsefffkclseoxwa.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${SUPABASE_DB_PASSWORD:your_db_password_here}
spring.datasource.driver-class-name=org.postgresql.Driver

# ───── JPA ─────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ───── JWT ─────
app.jwt.secret=${JWT_SECRET:WealthWise2026SuperSecretKeyThatIsLongEnoughForHS512Algorithm}
app.jwt.expiration-ms=86400000

# ───── CORS ─────
app.cors.allowed-origins=http://localhost:5173

# ───── Cache (Caffeine) ─────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# ───── Mail (placeholder) ─────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
