# ── Test-profile application properties ────────────────────────────────────
# Uses H2 in-memory so no real PostgreSQL connection is needed.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable mail auto-configuration in tests
spring.mail.host=localhost
spring.mail.port=25
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# JWT config required by AuthService
app.jwt.secret=test-secret-key-which-is-256-bits-long-for-hmac-signing-ok
app.jwt.expiration-ms=3600000

# Disable AMFI seed runner so tests don't try to call external APIs
app.amfi.seed-on-startup=false

# Quiet logging during tests
logging.level.root=WARN
logging.level.com.wealthwise=INFO
