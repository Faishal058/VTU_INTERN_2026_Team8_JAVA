server.port=8080

# ───── PostgreSQL / Supabase ─────
# Session-mode pooler (port 5432, ap-southeast-1) — supports prepared statements
# Username for pooler: postgres.<project-ref> (project ref appended)
#
# Connection string from: Supabase Dashboard → Project Settings → Database → Connection Pooling
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.vyolxcvchiiqdosjfoeb
spring.datasource.password=wealthwise@2004
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP pool tuning for Supabase pooler
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-init-sql=SELECT 1

# ───── JPA ─────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# pgBouncer transaction mode requires this off
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
# Required: when use_jdbc_metadata_defaults=false, Hibernate cannot auto-detect dialect from JDBC, so it must be set explicitly
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

